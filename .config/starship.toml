# Don't print a new line at the start of the prompt
# add_newline = false
# Pipes вХ∞вФА вХ≠вФА
# Powerline symbols ¬†оВ∞ оВ± оВ≤ оВ≥ оВі оВµ оВґ оВЈ оВЄ оВє оВЇ оВї оВЉ оВљ оВЊ оВњ оГА оГБ оГВ оГГ оГД оГЕ оГЖ оГЗ оГИ оГК  оГМ оГН оГО оГП оГР оГС оГФ оГТ 
# Wedges рЯ≠ІрЯ≠Т рЯ≠£рЯ≠ІрЯ≠У
# Random noise рЯђЦрЯђ•рЯђФрЯђЧ
# Cool stuff у∞Ь• о©± пБЛ пАН

format = """
$os $username$hostname $directory $git_branch $git_status
$character
"""
#format = """
#$cmd_duration$directory $git_branch $git_status
#$character"""

right_format = "$cmd_duration"

# Replace the "вЭѓ" symbol in the prompt with "вЮЬ"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[ о©± пБЛ](bold fg:blue)"
error_symbol = "[ пАН пБЛ](bold fg:red)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "bg: cyan"
symbol = "у∞Шђ"
truncation_length = 12
truncation_symbol = ""
format = "[оВґ](bold fg:cyan)[$symbol $branch(:$remote_branch)](fg:black bg:cyan)[оВі ](bold fg:cyan)"

[git_commit]
commit_hash_length = 4
tag_symbol = "пТґ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рЯНТ PICKING](bold red)"

[git_status]
conflicted =  "рЯП≥пЄП"
ahead = "рЯТ®"
behind = "рЯШ∞"
diverged = "рЯШµ"
untracked = "рЯ§Ј"
stashed = "рЯУ¶"
modified = "рЯУЭ"
staged = '[++\($count\)](green)'
renamed = "вЬНпЄП"
deleted = "рЯЧСпЄП "

[hostname]
ssh_only = false
format =  "[вАҐ$hostname](bg:cyan bold fg:black)[оВі](bold fg:cyan)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = 'рЯХЩ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:cyan fg:black"
style_root = "red bold"
format = "[оВґ](bold fg:cyan)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = " пС≠ "
read_only = " пСЦ "
style = "bg:green fg:black"
truncation_length = 6
truncation_symbol = " вАҐвАҐ/"
format = '[оВґ](bold fg:green)[у∞ЙЛ $path]($style)[оВі](bold fg:green)'


[directory.substitutions]
"Desktop" = " пТ© "
"Documents" = " пТ• "
"Downloads" = " пРЙ "
"Music" = " у∞ОИ "
"Pictures" = " пРП "
"Videos" = " пФђ "
"GitHub" = " у∞К§ "

[cmd_duration]
min_time = 0
format = '[оВґ](bold fg:yellow)[у∞™Ґ $duration](bold bg:yellow fg:black)[оВі](bold fg:yellow)'

[os]
disabled = false
format = '[оВґ](bold fg:cyan)[$symbol](bold bg:cyan fg:black)[оВі](bold fg:cyan)'

[os.symbols]
Arch = "пМГ "
